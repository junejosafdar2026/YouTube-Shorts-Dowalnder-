<!DOCTYPE html>
<html>
<head>
  <title>YouTube Shorts Downloader</title>
</head>

<body style="text-align:center; margin-top:50px; font-family:Arial;">

<h1>🎬 YouTube Shorts Downloader</h1>

<input type="text" id="videoUrl" placeholder="Paste YouTube Shorts link" style="width:300px; padding:10px;">
<br><br>

<button onclick="downloadVideo()" style="padding:10px 20px; cursor:pointer;">
  Download
</button>

<p id="msg"></p>

<script>
function downloadVideo() {
  const url = document.getElementById("videoUrl").value;

  if (!url) {
    alert("Please paste a link first!");
    return;
  }

  document.getElementById("msg").innerText = "Opening download page...";

  // This opens a real working downloader site
  const finalUrl = "https://en.savefrom.net/1-youtube-video-downloader-533nN/?url=" + encodeURIComponent(url);

  window.open(finalUrl, "_blank");
}
</script>

</body>
</html>
