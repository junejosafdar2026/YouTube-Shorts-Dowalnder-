<!DOCTYPE html>
<html>
<head>
  <title>YouTube Shorts Downloader</title>
</head>

<body>

<div style="text-align:center; margin-top:50px;">
  <h1>🎬 YouTube Shorts Downloader</h1>

  <input type="text" id="videoUrl" placeholder="Paste YouTube Shorts link" style="width:300px; padding:10px;">
  <br><br>

  <button onclick="downloadVideo()" style="padding:10px 20px;">Download</button>

  <div id="result" style="margin-top:20px;"></div>
</div>

<script>
function downloadVideo() {
  const url = document.getElementById("videoUrl").value;

  if (!url) {
    alert("Paste link first!");
    return;
  }

  const api = "https://api.vevioz.com/api/button/mp4?url=" + url;

  document.getElementById("result").innerHTML =
    '<iframe src="' + api + '" width="300" height="200" style="border:none;"></iframe>';
}
</script>

</body>
</html>
